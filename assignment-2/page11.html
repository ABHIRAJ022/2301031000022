<!DOCTYPE html>
<html>
<head>
<title>Health Categories</title>
<style>
body {
    background-color: #ff6600;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}
.title {
    background-color: #ffcc00;
    color: black;
    text-align: center;
    padding: 10px;
    font-size: 20px;
    grid-column: 1 / -1;
}
.category {
    background-color: #00cc66;
    color: black;
    text-align: center;
    padding: 20px;
    font-size: 16px;
}
</style>
</head>
<body>
<div class="container">
    <div class = "title">HEALTH</div>
    <div class="category">MEDICAL PROFESSIONAL</div>
    <div class="category">HEALTH ADMINISTRATION</div>
    <div class="category">PUBLIC HEALTH</div>
    <div class="category">RESEARCH AND DEVELOPMENT</div>
    <div class="category">MENTAL HEALTH</div>
    <div class="category">ALTERNATIVE MEDICINE</div>
</div>
</body>
</html>
