<!DOCTYPE html>
<html>
<head>
<title>Finance Categories</title>
<style>
body {
    background-color: #ff6600;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}
.title {
    background-color: #ffcc00;
    color: black;
    text-align: center;
    padding: 10px;
    font-size: 20px;
    grid-column: 1 / -1;
}
.category {
    background-color: #00cc66;
    color: black;
    text-align: center;
    padding: 20px;
    font-size: 16px;
}
</style>
</head>
<body>
<div class="container">
    <div class = "title">FINANCE</div>
    <div class="category">CORPORATE FINANCE</div>
    <div class="category">COMMERCIAL BANKING</div>
    <div class="category">INVESTMENT BANKING</div>
    <div class="category">RISK MANAGEMENT</div>
    <div class="category">ASSET MANAGEMENT</div>
    <div class="category">INSURANCE</div>
    <div class="category">PRIVATE EQUITY</div>
    <div class="category">PLANING AND ADVISORY</div>
    <div class="category">RETAIL BANKING</div>
    <div class="category">FINTECH</div>
</div>
</body>
</html>
