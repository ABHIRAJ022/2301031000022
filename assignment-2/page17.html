<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technology Branches</title>
    <style>
        body {
            background-color: #FF5733;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 500px;
        }
        .header {
            background-color: #33FFBD;
            color: #000;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .item {
            background-color: #FFC300;
            color: #000;
            text-align: center;
            padding: 20px;
            font-size: 20px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">TECHNOLOGY</div>
        <div class="item">DATA SCIENCE</div>
        <div class="item">CYBERSECURITY</div>
        <div class="item">SOFTWARE DEVELOPER</div>
    </div>
</body>
</html>
