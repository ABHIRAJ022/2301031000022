<!DOCTYPE html>
<html>
<head>
<title>Technical Categories</title>
<style>
body {
    background-color: #ff6600;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}
.title {
    background-color: #ffcc00;
    color: black;
    text-align: center;
    padding: 10px;
    font-size: 20px;
    grid-column: 1 / -1;
}
.category {
    background-color: #00cc66;
    color: black;
    text-align: center;
    padding: 20px;
    font-size: 16px;
}
</style>
</head>
<body>
<div class="container">
    <div class = "title">TECHNICAL</div>
    <div class="category">ENGINEERING</div>
    <div class="category">HEALTHCARE</div>
    <div class="category">COMPUTER SCIENCE</div>
    <div class="category">BUSINESS AND MANAGEMENT</div>
    <div class="category">TECHNOLOGY</div>
    <div class="category">FILM AND TELEVISION</div>
    <div class="category">SCIENCE</div>
    <div class="category">LIBRARY AND INFORMATION</div>
</div>
</body>
</html>
