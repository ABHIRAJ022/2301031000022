<!DOCTYPE html>
<html>
<head>
<title>Tospitality Categories</title>
<style>
body {
    background-color: #ff6600;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}
.title {
    background-color: #ffcc00;
    color: black;
    text-align: center;
    padding: 10px;
    font-size: 20px;
    grid-column: 1 / -1;
}
.category {
    background-color: #00cc66;
    color: black;
    text-align: center;
    padding: 20px;
    font-size: 16px;
}
.category1 {
    background-color: #00cc66;
    color: black;
    text-align: center;
    padding: 20px;
    font-size: 16px;
    grid-column: 1 / -1;
}
</style>
</head>
<body>
<div class="container">
    <div class = "title">HOSPITALITY</div>
    <div class="category">FOOD AND BEVERAGE</div>
    <div class="category">TRAVEL AND TOURISM</div>
    <div class="category1">ENTERTAINMENT AND RECREATION</div>
    <div class="category">MEETINGS AND EVENTS</div>
    <div class="category">LODGING AND ACCOMODATION</div>
</div>
</body>
</html>
