<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:orange;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            padding: 20px;
            text-align: center;
        }
        h2 {
            color: #FF0000;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            margin-bottom: 5px;
        }
        .form-group input {
            padding: 8px;
            border-radius: 4px;
        }
        .submit-button {
            background-color: #32CD32;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .submit-button:hover {
            background-color: #32CD32;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Log in</h2>
        <form>
            <div class="form-group">
                <label for="username">user name/id</label>
                <input type="text" id="username" name="username">
            </div>
            <div class="form-group">
                <label for="password">password</label>
                <input type="password" id="password" name="password">
            </div>
             <div class="form-group">
                <a href="../assignment-2/page2.html">
                    <button type="submit" class = "submit-button">
                        forget password
                    </button>
                </a>
             </div>
             <div>
                <a href="../assignment-2/page3.html">
                    <button type="submit" class = "submit-button">
                        new registration
                    </button>
                </a>
            </div>
            <div>
            <a href="../assignment-2/page4.html">
                <button type="submit" class = "submit-button">
                    submit
                </button>
            </a>
            </div>
        </form>
    </div>
</body>
</html>
