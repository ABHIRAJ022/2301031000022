<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #c9e66b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .feedback-form {
            text-align: center;
        }
        .stars {
            margin-bottom: 20px;
        }
        .stars span {
            font-size: 30px;
            color: #3b4cca;
            margin: 0 5px;
        }
        .feedback-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            height: 150px;
            background-color: #78e3b6;
        }
        .submit-button {
            background-color: #e63946;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="feedback-form">
        <h2>FEEDBACK FORM</h2>
        <div class="stars">
            <span>★</span>
            <span>★</span>
            <span>★</span>
            <span>★</span>
            <span>★</span>
        </div>
        <textarea class="feedback-input" placeholder="ADD YOR FEEDBACK HERE:-"></textarea>
        <a href="../code/page6.html">
        <button class="submit-button">SUBMIT</a></button>
    </div>
</body>
</html>
